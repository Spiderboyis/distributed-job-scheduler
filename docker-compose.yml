version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobscheduler-db
    environment:
      POSTGRES_USER: jobscheduler
      POSTGRES_PASSWORD: jobscheduler_secret
      POSTGRES_DB: jobscheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobscheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
